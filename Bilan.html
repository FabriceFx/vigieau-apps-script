<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 30px 20px;
      background-color: #f8f9fa;
      color: #202124;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 8px 16px -4px rgba(0,0,0,0.1), 0 4px 8px -4px rgba(0,0,0,0.06);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    .title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 14px;
      color: #5f6368;
      margin-bottom: 24px;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat-box {
      border-radius: 8px;
      padding: 16px;
      font-weight: 600;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .stat-crise { background: #fce8e6; color: #d93025; }
    .stat-alerte { background: #fef7e0; color: #f29900; }
    .stat-vigilance { background: #e8f0fe; color: #1a73e8; }
    .stat-normal { background: #e6f4ea; color: #137333; }
    
    .number { font-size: 32px; font-weight: 700; margin-bottom: 4px; line-height: 1; }
    .label { font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.9; }
    
    .btn-close {
      background: #1a73e8;
      color: white;
      border: none;
      padding: 12px 32px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .btn-close:hover { background: #1557b0; }
    .btn-close:active { transform: scale(0.98); }
  </style>
</head>
<body>
  <div class="card">
    <div class="title">Mise à jour terminée ✨</div>
    <div class="subtitle">La BDD a été synchronisée avec Vigieau</div>
    
    <div class="stats-grid">
      <div class="stat-box stat-crise">
        <div class="number"><?= nbCrise ?></div>
        <div class="label">Crise</div>
      </div>
      <div class="stat-box stat-alerte">
        <div class="number"><?= nbAlerte ?></div>
        <div class="label">Alerte</div>
      </div>
      <div class="stat-box stat-vigilance">
        <div class="number"><?= nbVigilance ?></div>
        <div class="label">Vigilance</div>
      </div>
      <div class="stat-box stat-normal">
        <div class="number"><?= nbNormal ?></div>
        <div class="label">Normal</div>
      </div>
    </div>
    
    <button class="btn-close" onclick="google.script.host.close()">Fermer le tableau de bord</button>
  </div>
</body>
</html>
